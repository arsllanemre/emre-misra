<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emre ❤️ Ayşe</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:40px;
}
h1{ font-size:38px; margin-bottom:10px; }
#timer{ font-size:20px; margin-bottom:40px; }
button{
  padding:15px 25px;
  font-size:16px;
  border-radius:12px;
  border:none;
  background:#ff2e63;
  color:white;
  cursor:pointer;
}
#secret{
  margin-top:30px;
  font-size:20px;
  opacity:0;
  transition:0.6s;
}
.gallery img{
  width:80%;
  max-width:300px;
  border-radius:15px;
  margin-top:15px;
}
.heart{
  position:fixed;
  color:#ff2e63;
  font-size:20px;
  animation:float 4s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<h1>Emre ❤️ Ayşe</h1>
<p id="timer"></p>

<button onclick="showMessage()">Gizli Mesaj 💌</button>

<div id="secret">
Sen hayatıma giren en güzel şeysin.  
İyi ki varsın ❤️
</div>

<h2 style="margin-top:50px">Anılarımız</h2>
<div class="gallery">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<script>
const startDate = new Date("2023-03-23");

function updateTimer(){
  const now = new Date();
  const diff = now - startDate;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor(diff / (1000*60*60)) % 24;
  document.getElementById("timer").innerHTML =
    days + " gün " + hours + " saattir birlikteyiz ❤️";
}
setInterval(updateTimer,1000);

function showMessage(){
  document.getElementById("secret").style.opacity = 1;
}

function createHeart(){
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100+"%";
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},4000)
}
setInterval(createHeart,800)
</script>

</body>
</html>
